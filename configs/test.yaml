# Test configuration - reduced epochs for quick pipeline validation

data:
  games_file: data/games.txt
  vocab_file: tokenizer/vocab.json
  max_seq_len: 150
  train_split: 0.95

model:
  d_model: 256
  n_heads: 8
  n_layers: 6
  d_ff: 1024
  dropout: 0.1

diffusion:
  num_timesteps: 100
  schedule: cosine

training:
  batch_size: 128
  learning_rate: 3.0e-4
  weight_decay: 0.01
  num_epochs: 500
  warmup_steps: 500
  grad_clip: 1.0
  log_every: 20
  eval_every: 1000
  save_every: 5
  checkpoint_dir: checkpoints
  seed: 42
  num_workers: 4

sampling:
  temperature: 0.9
  num_samples: 100
  seq_len: 100
